<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stats Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Brawl Stars Stats</h1>
        <div class="search-box">
            <input type="text" id="playerTag" placeholder="Введите тег (напр. #9PP9GLR)">
            <button onclick="getStats()">Найти</button>
        </div>
   <div id="result" class="stats-card" style="display:none;">
        <h2 id="name">Игрок</h2>
        <div class="stats-item">
            <span class="label">🏆 КУБКИ:</span>
            <span id="trophies">0</span>
        </div>
        <div class="stats-item">
            <span class="label">⭐ УРОВЕНЬ:</span>
            <span id="expLevel">0</span>
        </div>
        <div class="stats-item">
            <span class="label">🤖 БОЙЦЫ:</span>
            <span id="brawlersCount">0</span>
        </div>
        <div class="stats-item">
            <span class="label">⏳ В ИГРЕ:</span>
            <span id="hours">0</span> ч.
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
